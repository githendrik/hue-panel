name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt
        run: npm run build

      - name: Smoke test
        run: |
          node .output/server/index.mjs &
          sleep 2
          curl -sf http://localhost:3000/api/bridge | grep -q "configured"
          kill %1

      - name: Create release archive
        # Bundle the full .output/ folder + install script.
        # The LXC only needs Bun (or Node) installed — no npm, no build step.
        run: |
          cp install.sh .output/
          tar -czf hue-panel-linux-x64.tar.gz -C .output .
          sha256sum hue-panel-linux-x64.tar.gz > hue-panel-linux-x64.tar.gz.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hue-panel-linux-x64.tar.gz
            hue-panel-linux-x64.tar.gz.sha256
          generate_release_notes: true
