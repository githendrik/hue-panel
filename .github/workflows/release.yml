name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt
        run: npm run build

      - name: Compile binary (linux-x64)
        run: |
          # Symlink .output/server/node_modules into every chunk subdirectory
          # so bun's module resolver can find packages when traversing upward
          # from chunks/build/, chunks/_/, etc.
          for dir in .output/server/chunks/*/; do
            ln -s "$(pwd)/.output/server/node_modules" "${dir}node_modules" 2>/dev/null || true
          done
          cd .output/server
          bun build index.mjs \
            --compile \
            --target=bun-linux-x64 \
            --outfile hue-panel

      - name: Smoke test binary
        run: |
          .output/server/hue-panel &
          sleep 2
          curl -sf http://localhost:3000/api/bridge | grep -q "configured"
          kill %1

      - name: Create release archive
        run: |
          cp install.sh .output/server/
          tar -czf hue-panel-linux-x64.tar.gz -C .output/server hue-panel install.sh
          sha256sum hue-panel-linux-x64.tar.gz > hue-panel-linux-x64.tar.gz.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hue-panel-linux-x64.tar.gz
            hue-panel-linux-x64.tar.gz.sha256
          generate_release_notes: true
