name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt
        run: npm run build

      - name: Compile binary (linux-x64)
        run: |
          cd .output/server
          bun build index.mjs \
            --compile \
            --target=bun-linux-x64 \
            --external "@babel/parser" \
            --external "@vue/compiler-core" \
            --external "@vue/compiler-dom" \
            --external "@vue/compiler-ssr" \
            --external "@vue/devtools-api" \
            --external "@vue/reactivity" \
            --external "@vue/runtime-core" \
            --external "@vue/runtime-dom" \
            --external "@vue/server-renderer" \
            --external "@vue/shared" \
            --external "anymatch" \
            --external "chokidar" \
            --external "devalue" \
            --external "entities" \
            --external "estree-walker" \
            --external "hookable" \
            --external "normalize-path" \
            --external "perfect-debounce" \
            --external "picomatch" \
            --external "readdirp" \
            --external "source-map-js" \
            --external "ufo" \
            --external "unhead" \
            --external "vue" \
            --external "vue-bundle-renderer" \
            --external "vue-router" \
            --outfile hue-panel

      - name: Smoke test binary
        # Run from .output/server so bun resolves externals from node_modules there
        run: |
          cd .output/server && ./hue-panel &
          sleep 2
          curl -sf http://localhost:3000/api/bridge | grep -q "configured"
          kill %1

      - name: Create release archive
        # The binary must be run from a directory containing node_modules/.
        # We bundle everything together so the install script can place them correctly.
        run: |
          mkdir -p release/node_modules
          cp .output/server/hue-panel install.sh release/
          cp -r .output/server/node_modules/. release/node_modules/
          tar -czf hue-panel-linux-x64.tar.gz -C release .
          sha256sum hue-panel-linux-x64.tar.gz > hue-panel-linux-x64.tar.gz.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hue-panel-linux-x64.tar.gz
            hue-panel-linux-x64.tar.gz.sha256
          generate_release_notes: true
